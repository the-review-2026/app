<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="720" height="420" fill="#0f172a"/>

  <text x="360" y="36" text-anchor="middle" fill="#e2e8f0" font-size="22" font-family="sans-serif">ヒストグラム（度数）</text>

  <line x1="90" y1="360" x2="650" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <line x1="90" y1="80" x2="90" y2="360" stroke="#94a3b8" stroke-width="2"/>

  <line x1="84" y1="360" x2="96" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <line x1="84" y1="300" x2="96" y2="300" stroke="#94a3b8" stroke-width="2"/>
  <line x1="84" y1="240" x2="96" y2="240" stroke="#94a3b8" stroke-width="2"/>
  <line x1="84" y1="180" x2="96" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <line x1="84" y1="120" x2="96" y2="120" stroke="#94a3b8" stroke-width="2"/>

  <text x="70" y="365" fill="#cbd5e1" font-size="14" font-family="sans-serif">0</text>
  <text x="70" y="305" fill="#cbd5e1" font-size="14" font-family="sans-serif">2</text>
  <text x="70" y="245" fill="#cbd5e1" font-size="14" font-family="sans-serif">4</text>
  <text x="70" y="185" fill="#cbd5e1" font-size="14" font-family="sans-serif">6</text>
  <text x="70" y="125" fill="#cbd5e1" font-size="14" font-family="sans-serif">8</text>

  <rect x="110" y="300" width="100" height="60" fill="#60a5fa" opacity="0.9"/>
  <rect x="220" y="210" width="100" height="150" fill="#60a5fa" opacity="0.9"/>
  <rect x="330" y="90" width="100" height="270" fill="#38bdf8" opacity="0.95"/>
  <rect x="440" y="180" width="100" height="180" fill="#60a5fa" opacity="0.9"/>
  <rect x="550" y="270" width="100" height="90" fill="#60a5fa" opacity="0.9"/>

  <text x="160" y="384" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="sans-serif">0-10</text>
  <text x="270" y="384" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="sans-serif">10-20</text>
  <text x="380" y="384" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="sans-serif">20-30</text>
  <text x="490" y="384" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="sans-serif">30-40</text>
  <text x="600" y="384" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="sans-serif">40-50</text>

  <text x="660" y="365" fill="#cbd5e1" font-size="13" font-family="sans-serif">階級</text>
  <text x="28" y="78" fill="#cbd5e1" font-size="13" font-family="sans-serif">度数</text>
