<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <rect width="760" height="420" fill="#0f172a"/>

  <text x="380" y="48" text-anchor="middle" fill="#e2e8f0" font-size="24" font-family="sans-serif">度数分布表</text>

  <rect x="150" y="90" width="460" height="260" fill="#111827" stroke="#60a5fa" stroke-width="2"/>

  <line x1="150" y1="140" x2="610" y2="140" stroke="#334155" stroke-width="2"/>
  <line x1="390" y1="90" x2="390" y2="350" stroke="#334155" stroke-width="2"/>

  <line x1="150" y1="182" x2="610" y2="182" stroke="#1f2937" stroke-width="1.5"/>
  <line x1="150" y1="224" x2="610" y2="224" stroke="#1f2937" stroke-width="1.5"/>
  <line x1="150" y1="266" x2="610" y2="266" stroke="#1f2937" stroke-width="1.5"/>
  <line x1="150" y1="308" x2="610" y2="308" stroke="#1f2937" stroke-width="1.5"/>

  <text x="270" y="122" text-anchor="middle" fill="#bfdbfe" font-size="20" font-family="sans-serif">階級</text>
  <text x="500" y="122" text-anchor="middle" fill="#bfdbfe" font-size="20" font-family="sans-serif">度数</text>

  <text x="270" y="168" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">0以上10未満</text>
  <text x="500" y="168" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">2</text>

  <text x="270" y="210" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">10以上20未満</text>
  <text x="500" y="210" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">5</text>

  <text x="270" y="252" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">20以上30未満</text>
  <text x="500" y="252" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">9</text>

  <text x="270" y="294" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">30以上40未満</text>
  <text x="500" y="294" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">6</text>

  <text x="270" y="336" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">40以上50未満</text>
  <text x="500" y="336" text-anchor="middle" fill="#e5e7eb" font-size="18" font-family="sans-serif">3</text>

</svg>
